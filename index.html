<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vietnam Score - Live & Stats</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b0f1a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .video-container { 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #1e293b;
        }
        /* Fix hiển thị cho Widget Scoreaxis */
        .scoreaxis-widget {
            min-height: 500px;
            border-radius: 12px !important;
            overflow: hidden !important;
        }
    </style>
</head>
<body class="p-2 md:p-6">

    <div class="max-w-6xl mx-auto space-y-6">
        <div class="flex justify-between items-center bg-[#161b2a] p-4 rounded-xl border border-gray-800">
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 bg-red-600 rounded-full animate-ping"></span>
                <h1 class="font-bold uppercase tracking-widest text-sm text-red-500">Trực tiếp: Việt Nam vs Malaysia</h1>
            </div>
            <div class="text-[10px] bg-gray-800 px-2 py-1 rounded text-gray-400 uppercase font-bold">FPT Bóng Đá Việt</div>
        </div>

        <div class="grid lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 space-y-6">
                
                <div class="relative w-full rounded-2xl overflow-hidden video-container bg-black aspect-video">
                    <iframe 
                        class="absolute top-0 left-0 w-full h-full"
                        src="https://www.youtube.com/embed/TgRQUFGLiTY?autoplay=1&rel=0" 
                        title="Vietnam vs Malaysia Live" 
                        frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                        allowfullscreen>
                    </iframe>
                </div>

                <div class="bg-white rounded-2xl p-1 shadow-2xl">
                    <div id="widget-14xvmneopy1g" class="scoreaxis-widget" style="width: auto;height: auto;font-size: 14px;background-color: #ffffff;color: #141416;border: 1px solid;border-color: #ecf1f7;overflow: auto;">
                        <script src="https://widgets.scoreaxis.com/api/football/live-match/67592f989f9d73950005730a?widgetId=14xvmneopy1g&lang=en&lineupsBlock=1&eventsBlock=1&statsBlock=1&links=1&font=heebo&fontSize=14&rowDensity=100&widgetWidth=auto&widgetHeight=auto&bodyColor=%23ffffff&textColor=%23141416&linkColor=%23141416&borderColor=%23ecf1f7&tabColor=%23f3f8fd" async></script>
                        <div class="widget-main-link" style="padding: 6px 12px;font-weight: 500;">
                            Live data by <a href="https://www.scoreaxis.com/" style="color: inherit;">Scoreaxis</a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-1 space-y-6">
                <div class="bg-[#161b2a] p-6 rounded-2xl border border-gray-800">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="font-bold text-lg">Who will win?</h3>
                        <i class="fa-solid fa-trophy text-blue-500"></i>
                    </div>
                    <div class="space-y-4">
                        <button class="w-full flex items-center justify-between p-3 bg-gray-800/50 rounded-xl border border-transparent hover:border-red-500 transition">
                            <div class="flex items-center gap-3">
                                <img src="https://flagcdn.com/w40/vn.png" class="w-6 rounded-sm">
                                <span class="font-bold">Việt Nam</span>
                            </div>
                            <span class="font-black text-red-500">73%</span>
                        </button>
                        <button class="w-full flex items-center justify-between p-3 bg-gray-800/50 rounded-xl">
                            <span class="font-bold text-gray-400 ml-9">Hòa (X)</span>
                            <span class="font-black text-gray-500">10%</span>
                        </button>
                        <button class="w-full flex items-center justify-between p-3 bg-gray-800/50 rounded-xl border border-transparent hover:border-yellow-500 transition">
                            <div class="flex items-center gap-3">
                                <img src="https://flagcdn.com/w40/my.png" class="w-6 rounded-sm">
                                <span class="font-bold">Malaysia</span>
                            </div>
                            <span class="font-black text-yellow-500">17%</span>
                        </button>
                    </div>
                    <p class="text-[10px] text-gray-500 mt-4 text-center">Tổng cộng: 7,721 lượt bầu chọn</p>
                </div>

                <div class="bg-[#161b2a] p-4 rounded-2xl border border-gray-800">
                    <h4 class="text-xs font-bold text-gray-500 mb-3 uppercase">Dự báo khu vực nóng</h4>
                    <div class="h-48 rounded-lg bg-[url('https://www.shutterstock.com/image-vector/vector-overhead-view-soccer-pitch-260nw-1042721833.jpg')] bg-cover bg-center relative opacity-80">
                        <div class="absolute top-1/2 left-1/4 w-12 h-12 bg-red-500/60 rounded-full blur-xl animate-pulse"></div>
                        <div class="absolute top-1/3 right-1/4 w-16 h-16 bg-yellow-400/50 rounded-full blur-2xl"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.onload = function() {
            console.log("Trang đã sẵn sàng!");
            // Nếu widget vẫn không hiện, ní thử mở file bằng Web Server (Live Server trong VS Code) thay vì click đúp file html
        };
    </script>
</body>
</html>
