<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vietnam Score Live - FPT Play & Scoreaxis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        /* Tùy chỉnh nhẹ để Widget của bạn nổi bật trên nền tối */
        .widget-container {
            background: #ffffff; /* Giữ trắng theo code gốc của bạn cho dễ đọc stats */
            border-radius: 12px;
            overflow: hidden;
            margin-top: 1.5rem;
        }
        .video-shadow { box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5); }
    </style>
</head>
<body class="p-4 md:p-6">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-3">
                <div class="bg-red-600 px-3 py-1 rounded text-xs font-bold animate-pulse">LIVE</div>
                <h1 class="text-xl font-black uppercase tracking-tighter">Vietnam Score</h1>
            </div>
            <div class="text-sm text-gray-400">
                <i class="fa-regular fa-clock mr-1"></i> <span id="current-time"></span>
            </div>
        </header>

        <div class="grid lg:grid-cols-3 gap-6">
            
            <div class="lg:col-span-2 space-y-6">
                
                <div class="relative w-full rounded-2xl overflow-hidden video-shadow bg-black aspect-video border border-gray-800">
                    <iframe 
                        class="absolute top-0 left-0 w-full h-full"
                        src="https://www.youtube.com/live/TgRQUFGLiTY?si=reUuBLy_TgLD96Xk" 
                        title="Live Stream FPT Bóng Đá Việt" 
                        frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen>
                    </iframe>
                </div>

                <div class="widget-container shadow-2xl">
                    <div id="widget-zy2bmneoeg7w" class="scoreaxis-widget" style="width: auto;height: auto;font-size: 14px;background-color: #ffffff;color: #141416;border: 1px solid;border-color: #ecf1f7;overflow: auto;">
                        <script src="https://widgets.scoreaxis.com/api/football/live-match/67592f989f9d73950005730a?widgetId=zy2bmneoeg7w&lang=en&lineupsBlock=1&eventsBlock=1&statsBlock=1&links=1&font=heebo&fontSize=14&rowDensity=100&widgetWidth=auto&widgetHeight=auto&bodyColor=%23ffffff&textColor=%23141416&linkColor=%23141416&borderColor=%23ecf1f7&tabColor=%23f3f8fd" async></script>
                        <div class="widget-main-link" style="padding: 6px 12px;font-weight: 500;">
                            Live data by <a href="https://www.scoreaxis.com/" style="color: inherit;">Scoreaxis</a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-1 space-y-6">
                <div class="bg-[#1e293b] p-6 rounded-2xl border border-gray-700 shadow-lg">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <h3 class="font-bold text-lg">Ai thắng trận này?</h3>
                            <p class="text-xs text-gray-500">Tổng cộng: 7.7k bình chọn</p>
                        </div>
                        <i class="fa-solid fa-trophy text-blue-500 text-xl"></i>
                    </div>

                    <div class="grid grid-cols-3 gap-3">
                        <button class="flex flex-col items-center gap-2 p-3 bg-gray-800 rounded-xl hover:bg-red-900/30 transition border border-transparent hover:border-red-500">
                            <img src="https://flagcdn.com/w40/vn.png" class="w-8 rounded-sm shadow">
                            <span class="font-black text-red-500">73%</span>
                        </button>
                        <button class="flex flex-col items-center gap-2 p-3 bg-gray-800 rounded-xl hover:bg-gray-700 transition">
                            <span class="h-8 flex items-center font-bold text-gray-400">X</span>
                            <span class="font-black text-gray-400">10%</span>
                        </button>
                        <button class="flex flex-col items-center gap-2 p-3 bg-gray-800 rounded-xl hover:bg-yellow-900/30 transition border border-transparent hover:border-yellow-500">
                            <img src="https://flagcdn.com/w40/my.png" class="w-8 rounded-sm shadow">
                            <span class="font-black text-yellow-500">17%</span>
                        </button>
                    </div>
                </div>

                <div class="bg-gradient-to-br from-blue-900/20 to-purple-900/20 p-6 rounded-2xl border border-blue-500/20">
                    <h4 class="text-xs font-bold text-blue-400 uppercase mb-3">Thông tin trận đấu</h4>
                    <ul class="text-sm space-y-3">
                        <li class="flex justify-between"><span class="text-gray-400">Giải đấu:</span> <span class="font-medium text-right text-xs">Vòng loại Asian Cup 2027</span></li>
                        <li class="flex justify-between"><span class="text-gray-400">SVĐ:</span> <span class="font-medium text-right text-xs">Mỹ Đình, Việt Nam</span></li>
                        <li class="flex justify-between"><span class="text-gray-400">Nguồn phát:</span> <span class="font-medium text-red-400 italic">FPT Play</span></li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Cập nhật giờ hệ thống
        function updateTime() {
            const now = new Date();
            document.getElementById('current-time').innerText = now.toLocaleTimeString('vi-VN');
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
